<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa"/>
      <stop offset="100%" style="stop-color:#e8eaf6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Large leaf shape -->
  <path d="M50 260 Q120 200 200 80 Q280 200 350 260Z" fill="#66bb6a" stroke="#4caf50" stroke-width="1.5"/>
  <line x1="200" y1="85" x2="200" y2="258" stroke="#4caf50" stroke-width="2" opacity="0.5"/>
  <!-- Leaf veins -->
  <line x1="200" y1="130" x2="140" y2="190" stroke="#4caf50" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="130" x2="260" y2="190" stroke="#4caf50" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="170" x2="120" y2="230" stroke="#4caf50" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="170" x2="280" y2="230" stroke="#4caf50" stroke-width="1" opacity="0.4"/>
  <!-- Blight patches (dark water-soaked areas) -->
  <ellipse cx="160" cy="180" rx="35" ry="25" fill="#3e2723" opacity="0.7" transform="rotate(-15 160 180)"/>
  <ellipse cx="160" cy="180" rx="25" ry="18" fill="#1b0000" opacity="0.5" transform="rotate(-15 160 180)"/>
  <ellipse cx="255" cy="200" rx="30" ry="22" fill="#3e2723" opacity="0.6" transform="rotate(10 255 200)"/>
  <ellipse cx="255" cy="200" rx="20" ry="15" fill="#1b0000" opacity="0.4" transform="rotate(10 255 200)"/>
  <ellipse cx="200" cy="230" rx="40" ry="20" fill="#4e342e" opacity="0.6"/>
  <ellipse cx="200" cy="230" rx="28" ry="14" fill="#3e2723" opacity="0.5"/>
  <!-- White fuzzy mildew on edges -->
  <g fill="#fff" opacity="0.7">
    <circle cx="135" cy="170" r="3"/>
    <circle cx="140" cy="165" r="2.5"/>
    <circle cx="130" cy="175" r="2"/>
    <circle cx="145" cy="193" r="2.5"/>
    <circle cx="175" cy="198" r="2"/>
    <circle cx="280" cy="195" r="3"/>
    <circle cx="275" cy="190" r="2.5"/>
    <circle cx="235" cy="190" r="2"/>
    <circle cx="240" cy="215" r="2.5"/>
    <circle cx="170" cy="240" r="2.5"/>
    <circle cx="230" cy="238" r="2.5"/>
  </g>
  <!-- Yellowing margin -->
  <path d="M80 240 Q100 225 130 200" stroke="#ffc107" stroke-width="6" fill="none" opacity="0.4"/>
  <path d="M270 200 Q300 225 320 240" stroke="#ffc107" stroke-width="6" fill="none" opacity="0.4"/>
  <!-- Labels -->
  <rect x="10" y="10" width="185" height="24" rx="12" fill="#fff" opacity="0.9"/>
  <text x="102" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4a148c">Late Blight / Downy Mildew</text>
  <!-- Indicators -->
  <line x1="90" y1="170" x2="132" y2="175" stroke="#d32f2f" stroke-width="1.5"/>
  <text x="30" y="165" font-family="Arial,sans-serif" font-size="9" fill="#d32f2f">Water-soaked</text>
  <text x="30" y="176" font-family="Arial,sans-serif" font-size="9" fill="#d32f2f">dark lesion</text>
  <line x1="310" y1="180" x2="283" y2="193" stroke="#fff" stroke-width="1.5"/>
  <text x="312" y="178" font-family="Arial,sans-serif" font-size="9" fill="#7b1fa2">White mildew</text>
  <text x="312" y="189" font-family="Arial,sans-serif" font-size="9" fill="#7b1fa2">growth</text>
</svg>