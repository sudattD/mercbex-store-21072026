<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Leaf (underside view) -->
  <path d="M40 280 Q150 100 200 40 Q250 100 360 280Z" fill="#a5d6a7" stroke="#81c784" stroke-width="1.5"/>
  <line x1="200" y1="50" x2="200" y2="275" stroke="#81c784" stroke-width="2" opacity="0.6"/>
  <!-- Leaf veins (underside prominent) -->
  <line x1="200" y1="100" x2="120" y2="180" stroke="#81c784" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="100" x2="280" y2="180" stroke="#81c784" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="150" x2="100" y2="230" stroke="#81c784" stroke-width="1.2" opacity="0.4"/>
  <line x1="200" y1="150" x2="300" y2="230" stroke="#81c784" stroke-width="1.2" opacity="0.4"/>
  <!-- Stippling damage (tiny yellow dots) -->
  <g fill="#ffeb3b" opacity="0.5">
    <circle cx="170" cy="140" r="2"/><circle cx="180" cy="135" r="1.5"/>
    <circle cx="190" cy="145" r="2"/><circle cx="175" cy="150" r="1.5"/>
    <circle cx="165" cy="155" r="2"/><circle cx="185" cy="155" r="1.5"/>
    <circle cx="220" cy="140" r="2"/><circle cx="230" cy="145" r="1.5"/>
    <circle cx="215" cy="150" r="2"/><circle cx="235" cy="155" r="1.5"/>
    <circle cx="225" cy="160" r="2"/><circle cx="210" cy="158" r="1.5"/>
    <circle cx="160" cy="180" r="2"/><circle cx="170" cy="185" r="1.5"/>
    <circle cx="240" cy="180" r="2"/><circle cx="230" cy="188" r="1.5"/>
    <circle cx="200" cy="190" r="2"/><circle cx="195" cy="195" r="1.5"/>
    <circle cx="210" cy="195" r="2"/><circle cx="180" cy="200" r="1.5"/>
  </g>
  <!-- Webbing (spider mite webs) -->
  <g stroke="#ddd" stroke-width="0.5" fill="none" opacity="0.6">
    <path d="M160 160 Q180 155 200 165 Q220 158 240 165"/>
    <path d="M155 175 Q185 168 215 178 Q235 172 250 178"/>
    <path d="M160 160 Q158 170 155 175"/>
    <path d="M200 165 Q210 172 215 178"/>
    <path d="M240 165 Q245 172 250 178"/>
    <path d="M180 155 Q178 165 175 175"/>
  </g>
  <!-- Mites (tiny red/brown dots with legs) -->
  <g>
    <circle cx="180" cy="165" r="3" fill="#d32f2f"/>
    <line x1="177" y1="163" x2="174" y2="160" stroke="#b71c1c" stroke-width="0.5"/>
    <line x1="183" y1="163" x2="186" y2="160" stroke="#b71c1c" stroke-width="0.5"/>
    <line x1="177" y1="167" x2="174" y2="170" stroke="#b71c1c" stroke-width="0.5"/>
    <line x1="183" y1="167" x2="186" y2="170" stroke="#b71c1c" stroke-width="0.5"/>
  </g>
  <g>
    <circle cx="220" cy="170" r="2.5" fill="#e53935"/>
    <line x1="218" y1="168" x2="215" y2="166" stroke="#b71c1c" stroke-width="0.5"/>
    <line x1="222" y1="168" x2="225" y2="166" stroke="#b71c1c" stroke-width="0.5"/>
    <line x1="218" y1="172" x2="215" y2="174" stroke="#b71c1c" stroke-width="0.5"/>
    <line x1="222" y1="172" x2="225" y2="174" stroke="#b71c1c" stroke-width="0.5"/>
  </g>
  <g>
    <circle cx="195" cy="180" r="2" fill="#d32f2f"/>
    <line x1="193" y1="178" x2="191" y2="176" stroke="#b71c1c" stroke-width="0.5"/>
    <line x1="197" y1="178" x2="199" y2="176" stroke="#b71c1c" stroke-width="0.5"/>
    <line x1="193" y1="182" x2="191" y2="184" stroke="#b71c1c" stroke-width="0.5"/>
    <line x1="197" y1="182" x2="199" y2="184" stroke="#b71c1c" stroke-width="0.5"/>
  </g>
  <g>
    <circle cx="240" cy="185" r="2.5" fill="#e53935"/>
    <line x1="238" y1="183" x2="236" y2="181" stroke="#b71c1c" stroke-width="0.5"/>
    <line x1="242" y1="183" x2="244" y2="181" stroke="#b71c1c" stroke-width="0.5"/>
  </g>
  <!-- Magnifying glass effect -->
  <circle cx="200" cy="170" r="45" fill="none" stroke="#5d4037" stroke-width="2.5" opacity="0.4"/>
  <line x1="232" y1="202" x2="260" y2="230" stroke="#5d4037" stroke-width="3" opacity="0.4"/>
  <!-- Labels -->
  <rect x="10" y="10" width="160" height="24" rx="12" fill="#fff" opacity="0.9"/>
  <text x="90" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#bf360c">Mites / Sucking Pests</text>
  <!-- Indicators -->
  <text x="290" y="140" font-family="Arial,sans-serif" font-size="9" fill="#d32f2f">Red spider</text>
  <text x="290" y="151" font-family="Arial,sans-serif" font-size="9" fill="#d32f2f">mites</text>
  <line x1="288" y1="148" x2="245" y2="167" stroke="#d32f2f" stroke-width="1.5"/>
  <text x="70" y="130" font-family="Arial,sans-serif" font-size="9" fill="#ff9800">Stippling</text>
  <text x="70" y="141" font-family="Arial,sans-serif" font-size="9" fill="#ff9800">damage</text>
  <line x1="108" y1="135" x2="160" y2="145" stroke="#ff9800" stroke-width="1.2"/>
  <text x="265" y="240" font-family="Arial,sans-serif" font-size="9" fill="#795548">Webbing</text>
  <line x1="263" y1="237" x2="245" y2="178" stroke="#795548" stroke-width="1"/>
</svg>