<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#4e342e"/>
      <stop offset="30%" style="stop-color:#795548"/>
      <stop offset="40%" style="stop-color:#a5d6a7"/>
      <stop offset="100%" style="stop-color:#fff9c4"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Ground/path area -->
  <path d="M0 220 Q100 210 200 215 Q300 220 400 215 L400 300 L0 300Z" fill="#6d4c41" opacity="0.5"/>
  <!-- Weed growing through crack -->
  <line x1="200" y1="230" x2="200" y2="220" stroke="#5d4037" stroke-width="1"/>
  <!-- Strong thick weed stem -->
  <g transform="translate(200, 220)">
    <line x1="0" y1="0" x2="-5" y2="-80" stroke="#558b2f" stroke-width="4"/>
    <line x1="0" y1="0" x2="8" y2="-90" stroke="#558b2f" stroke-width="3.5"/>
    <!-- Thick leaves -->
    <path d="M-5 -30 Q-30 -50 -40 -35 Q-25 -30 -5 -30Z" fill="#689f38" stroke="#558b2f" stroke-width="1"/>
    <path d="M0 -45 Q25 -60 35 -45 Q20 -42 0 -45Z" fill="#689f38" stroke="#558b2f" stroke-width="1"/>
    <path d="M-3 -55 Q-30 -75 -38 -58 Q-22 -55 -3 -55Z" fill="#7cb342" stroke="#558b2f" stroke-width="1"/>
    <path d="M5 -70 Q30 -85 38 -68 Q22 -67 5 -70Z" fill="#689f38" stroke="#558b2f" stroke-width="1"/>
    <path d="M-5 -75 Q-25 -95 -35 -80 Q-20 -75 -5 -75Z" fill="#7cb342" stroke="#558b2f" stroke-width="1"/>
    <!-- Deep root system (visible) -->
    <path d="M0 0 Q-10 30 -20 60" stroke="#795548" stroke-width="3" fill="none"/>
    <path d="M0 0 Q10 35 25 65" stroke="#795548" stroke-width="2.5" fill="none"/>
    <path d="M0 0 Q-5 40 0 70" stroke="#795548" stroke-width="3.5" fill="none"/>
    <path d="M-20 60 Q-30 70 -35 80" stroke="#795548" stroke-width="1.5" fill="none"/>
    <path d="M25 65 Q35 75 40 82" stroke="#795548" stroke-width="1.5" fill="none"/>
    <path d="M0 70 Q-5 80 -8 88" stroke="#795548" stroke-width="2" fill="none"/>
    <path d="M0 70 Q5 82 8 88" stroke="#795548" stroke-width="2" fill="none"/>
  </g>
  <!-- Struggling crop nearby -->
  <g transform="translate(100, 230)">
    <line x1="0" y1="0" x2="2" y2="-40" stroke="#a5d6a7" stroke-width="1.5"/>
    <path d="M2 -25 Q12 -35 15 -28 Q8 -25 2 -25Z" fill="#a5d6a7" opacity="0.7"/>
    <path d="M2 -35 Q-8 -42 -10 -35 Q-5 -33 2 -35Z" fill="#a5d6a7" opacity="0.7"/>
  </g>
  <g transform="translate(310, 225)">
    <line x1="0" y1="0" x2="-2" y2="-35" stroke="#a5d6a7" stroke-width="1.5"/>
    <path d="M-2 -20 Q8 -30 10 -23 Q4 -20 -2 -20Z" fill="#a5d6a7" opacity="0.7"/>
  </g>
  <!-- Skull/danger indicator -->
  <circle cx="200" cy="100" r="25" fill="none" stroke="#ff5722" stroke-width="2.5" opacity="0.6"/>
  <text x="200" y="107" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" fill="#ff5722" opacity="0.7">!</text>
  <!-- Labels -->
  <rect x="10" y="10" width="180" height="24" rx="12" fill="#fff" opacity="0.9"/>
  <text x="100" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#e65100">Stubborn / Non-selective Weeds</text>
  <!-- Indicators -->
  <text x="260" y="250" font-family="Arial,sans-serif" font-size="9" fill="#d32f2f">Deep root</text>
  <text x="260" y="261" font-family="Arial,sans-serif" font-size="9" fill="#d32f2f">system</text>
  <line x1="258" y1="255" x2="230" y2="260" stroke="#d32f2f" stroke-width="1.5"/>
  <text x="30" y="190" font-family="Arial,sans-serif" font-size="9" fill="#689f38">Weak crop</text>
  <line x1="73" y1="195" x2="98" y2="205" stroke="#689f38" stroke-width="1"/>
</svg>