<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#5d4037"/>
      <stop offset="30%" style="stop-color:#8d6e63"/>
      <stop offset="40%" style="stop-color:#c5e1a5"/>
      <stop offset="100%" style="stop-color:#e8f5e9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Paddy field water -->
  <rect x="0" y="215" width="400" height="85" fill="#4fc3f7" opacity="0.2"/>
  <!-- Rice crop plants -->
  <g stroke="#388e3c" stroke-width="2" fill="none">
    <path d="M50 280 Q50 220 55 180"/>
    <path d="M55 180 Q65 165 70 170" fill="#4caf50" stroke="#4caf50" stroke-width="1"/>
    <path d="M55 190 Q45 175 40 180" fill="#4caf50" stroke="#4caf50" stroke-width="1"/>
    <path d="M100 280 Q100 215 105 175"/>
    <path d="M105 175 Q115 160 120 165" fill="#4caf50" stroke="#4caf50" stroke-width="1"/>
    <path d="M105 185 Q95 170 90 175" fill="#4caf50" stroke="#4caf50" stroke-width="1"/>
    <path d="M300 280 Q300 220 305 180"/>
    <path d="M305 180 Q315 165 320 170" fill="#4caf50" stroke="#4caf50" stroke-width="1"/>
    <path d="M350 280 Q350 225 355 185"/>
    <path d="M355 185 Q365 170 370 175" fill="#4caf50" stroke="#4caf50" stroke-width="1"/>
  </g>
  <!-- Grassy weeds (dense, thin blades) in center -->
  <g stroke="#7cb342" stroke-width="1.5" fill="none">
    <path d="M170 280 Q168 230 160 160 Q155 140 165 120"/>
    <path d="M180 280 Q182 225 190 155 Q195 130 188 105"/>
    <path d="M190 280 Q188 235 180 170 Q178 150 185 130"/>
    <path d="M200 280 Q202 230 210 160 Q215 135 208 110"/>
    <path d="M210 280 Q208 240 200 175 Q198 155 205 135"/>
    <path d="M220 280 Q222 235 230 165 Q235 140 228 115"/>
    <path d="M230 280 Q228 240 220 180 Q218 160 225 140"/>
    <path d="M240 280 Q242 230 248 165 Q252 145 245 125"/>
  </g>
  <!-- Seed heads on weeds -->
  <g fill="#9e9d24" opacity="0.8">
    <ellipse cx="165" cy="118" rx="3" ry="8"/>
    <ellipse cx="188" cy="103" rx="3" ry="8"/>
    <ellipse cx="185" cy="128" rx="2.5" ry="7"/>
    <ellipse cx="208" cy="108" rx="3" ry="8"/>
    <ellipse cx="205" cy="133" rx="2.5" ry="7"/>
    <ellipse cx="228" cy="113" rx="3" ry="8"/>
    <ellipse cx="225" cy="138" rx="2.5" ry="7"/>
    <ellipse cx="245" cy="123" rx="3" ry="8"/>
  </g>
  <!-- Danger circle -->
  <ellipse cx="200" cy="190" rx="60" ry="80" fill="none" stroke="#d32f2f" stroke-width="2" stroke-dasharray="6 3" opacity="0.6"/>
  <!-- Labels -->
  <rect x="10" y="10" width="130" height="24" rx="12" fill="#fff" opacity="0.9"/>
  <text x="75" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#33691e">Grassy Weeds</text>
  <!-- Indicators -->
  <text x="280" y="100" font-family="Arial,sans-serif" font-size="10" fill="#d32f2f" font-weight="bold">Dense weed</text>
  <text x="280" y="112" font-family="Arial,sans-serif" font-size="9" fill="#d32f2f">growth choking</text>
  <text x="280" y="123" font-family="Arial,sans-serif" font-size="9" fill="#d32f2f">crop plants</text>
  <line x1="278" y1="115" x2="245" y2="130" stroke="#d32f2f" stroke-width="1.5"/>
  <text x="30" y="200" font-family="Arial,sans-serif" font-size="9" fill="#388e3c">Rice crop</text>
  <line x1="70" y1="197" x2="95" y2="195" stroke="#388e3c" stroke-width="1"/>
</svg>