<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#5d4037"/>
      <stop offset="25%" style="stop-color:#8d6e63"/>
      <stop offset="35%" style="stop-color:#a5d6a7"/>
      <stop offset="100%" style="stop-color:#e3f2fd"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Crop rows (wheat/rice) -->
  <g stroke="#388e3c" stroke-width="2.5" fill="none">
    <line x1="80" y1="280" x2="80" y2="160"/>
    <line x1="120" y1="280" x2="120" y2="150"/>
    <line x1="160" y1="280" x2="160" y2="155"/>
    <line x1="280" y1="280" x2="280" y2="155"/>
    <line x1="320" y1="280" x2="320" y2="150"/>
    <line x1="360" y1="280" x2="360" y2="160"/>
  </g>
  <!-- Crop leaves -->
  <g fill="#4caf50" opacity="0.8">
    <path d="M80 180 Q90 170 95 175 Q85 180 80 180Z"/>
    <path d="M80 190 Q70 180 65 185 Q75 188 80 190Z"/>
    <path d="M120 170 Q130 160 135 165 Q125 170 120 170Z"/>
    <path d="M120 180 Q110 170 105 175 Q115 178 120 180Z"/>
    <path d="M160 175 Q170 165 175 170 Q165 175 160 175Z"/>
    <path d="M280 175 Q290 165 295 170 Q285 175 280 175Z"/>
    <path d="M320 170 Q310 160 305 165 Q315 168 320 170Z"/>
    <path d="M360 180 Q370 170 375 175 Q365 180 360 180Z"/>
  </g>
  <!-- Broadleaf weed 1 (center, prominent) -->
  <g transform="translate(210, 200)">
    <line x1="0" y1="80" x2="0" y2="0" stroke="#2e7d32" stroke-width="3"/>
    <!-- Broad leaves -->
    <ellipse cx="-25" cy="-10" rx="25" ry="12" fill="#43a047" transform="rotate(-30 -25 -10)"/>
    <line x1="0" y1="-5" x2="-25" y2="-10" stroke="#2e7d32" stroke-width="1.5"/>
    <ellipse cx="28" cy="-25" rx="24" ry="11" fill="#43a047" transform="rotate(20 28 -25)"/>
    <line x1="0" y1="-20" x2="28" y2="-25" stroke="#2e7d32" stroke-width="1.5"/>
    <ellipse cx="-20" cy="-45" rx="22" ry="10" fill="#43a047" transform="rotate(-25 -20 -45)"/>
    <line x1="0" y1="-35" x2="-20" y2="-45" stroke="#2e7d32" stroke-width="1.5"/>
    <ellipse cx="20" cy="-55" rx="20" ry="10" fill="#43a047" transform="rotate(15 20 -55)"/>
    <line x1="0" y1="-50" x2="20" y2="-55" stroke="#2e7d32" stroke-width="1.5"/>
    <!-- Small flower -->
    <circle cx="0" cy="-70" r="6" fill="#ffeb3b"/>
    <circle cx="0" cy="-70" r="3" fill="#f57f17"/>
  </g>
  <!-- Broadleaf weed 2 (smaller) -->
  <g transform="translate(240, 230)">
    <line x1="0" y1="50" x2="0" y2="0" stroke="#2e7d32" stroke-width="2"/>
    <ellipse cx="-15" cy="-5" rx="16" ry="8" fill="#43a047" transform="rotate(-20 -15 -5)"/>
    <ellipse cx="15" cy="-20" rx="15" ry="7" fill="#43a047" transform="rotate(15 15 -20)"/>
    <ellipse cx="-12" cy="-35" rx="14" ry="7" fill="#43a047" transform="rotate(-15 -12 -35)"/>
  </g>
  <!-- Red circles around weeds -->
  <circle cx="215" cy="180" r="55" fill="none" stroke="#d32f2f" stroke-width="2" stroke-dasharray="6 3" opacity="0.7"/>
  <!-- Labels -->
  <rect x="10" y="10" width="140" height="24" rx="12" fill="#fff" opacity="0.9"/>
  <text x="80" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#1b5e20">Broadleaf Weeds</text>
  <!-- Indicators -->
  <text x="270" y="120" font-family="Arial,sans-serif" font-size="10" fill="#d32f2f" font-weight="bold">Weed</text>
  <text x="270" y="132" font-family="Arial,sans-serif" font-size="9" fill="#d32f2f">competing</text>
  <text x="270" y="143" font-family="Arial,sans-serif" font-size="9" fill="#d32f2f">with crops</text>
  <line x1="285" y1="148" x2="230" y2="165" stroke="#d32f2f" stroke-width="1.5"/>
  <text x="50" y="260" font-family="Arial,sans-serif" font-size="9" fill="#388e3c">Crop rows</text>
</svg>