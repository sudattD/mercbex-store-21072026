<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8e1"/>
      <stop offset="100%" style="stop-color:#ffe082"/>
    </linearGradient>
    <linearGradient id="sack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d7ccc8"/>
      <stop offset="100%" style="stop-color:#bcaaa4"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Storage sack -->
  <path d="M80 100 Q80 80 120 70 L280 70 Q320 80 320 100 L320 260 Q320 280 280 280 L120 280 Q80 280 80 260Z" fill="url(#sack)" stroke="#8d6e63" stroke-width="2"/>
  <!-- Sack texture lines -->
  <line x1="120" y1="75" x2="120" y2="275" stroke="#a1887f" stroke-width="0.5" opacity="0.4"/>
  <line x1="160" y1="72" x2="160" y2="278" stroke="#a1887f" stroke-width="0.5" opacity="0.4"/>
  <line x1="200" y1="70" x2="200" y2="280" stroke="#a1887f" stroke-width="0.5" opacity="0.4"/>
  <line x1="240" y1="72" x2="240" y2="278" stroke="#a1887f" stroke-width="0.5" opacity="0.4"/>
  <line x1="280" y1="75" x2="280" y2="275" stroke="#a1887f" stroke-width="0.5" opacity="0.4"/>
  <!-- Grain pile visible at top -->
  <g fill="#f9a825">
    <ellipse cx="150" cy="110" rx="4" ry="2.5"/>
    <ellipse cx="160" cy="108" rx="4" ry="2.5"/>
    <ellipse cx="170" cy="112" rx="4" ry="2.5"/>
    <ellipse cx="180" cy="107" rx="4" ry="2.5"/>
    <ellipse cx="190" cy="110" rx="4" ry="2.5"/>
    <ellipse cx="200" cy="108" rx="4" ry="2.5"/>
    <ellipse cx="210" cy="112" rx="4" ry="2.5"/>
    <ellipse cx="220" cy="107" rx="4" ry="2.5"/>
    <ellipse cx="230" cy="110" rx="4" ry="2.5"/>
    <ellipse cx="240" cy="108" rx="4" ry="2.5"/>
    <ellipse cx="250" cy="112" rx="4" ry="2.5"/>
  </g>
  <!-- Damaged grains (with holes) -->
  <g>
    <ellipse cx="155" cy="130" rx="5" ry="3" fill="#fbc02d"/>
    <circle cx="155" cy="130" r="1.5" fill="#5d4037"/>
    <ellipse cx="200" cy="125" rx="5" ry="3" fill="#fbc02d"/>
    <circle cx="200" cy="125" r="1.5" fill="#5d4037"/>
    <ellipse cx="240" cy="128" rx="5" ry="3" fill="#fbc02d"/>
    <circle cx="240" cy="128" r="1.5" fill="#5d4037"/>
  </g>
  <!-- Weevils/beetles -->
  <g transform="translate(170, 155)">
    <ellipse cx="0" cy="0" rx="7" ry="5" fill="#5d4037"/>
    <ellipse cx="-6" cy="-1" rx="4" ry="3" fill="#4e342e"/>
    <line x1="-9" y1="-3" x2="-13" y2="-7" stroke="#3e2723" stroke-width="0.8"/>
    <line x1="-9" y1="-1" x2="-14" y2="-3" stroke="#3e2723" stroke-width="0.8"/>
    <line x1="-3" y1="4" x2="-5" y2="8" stroke="#3e2723" stroke-width="0.8"/>
    <line x1="3" y1="4" x2="5" y2="8" stroke="#3e2723" stroke-width="0.8"/>
    <line x1="-3" y1="-4" x2="-5" y2="-8" stroke="#3e2723" stroke-width="0.8"/>
    <line x1="3" y1="-4" x2="5" y2="-8" stroke="#3e2723" stroke-width="0.8"/>
  </g>
  <g transform="translate(230, 170)">
    <ellipse cx="0" cy="0" rx="6" ry="4" fill="#6d4c41"/>
    <ellipse cx="-5" cy="0" rx="3.5" ry="2.5" fill="#5d4037"/>
    <line x1="-8" y1="-2" x2="-11" y2="-5" stroke="#3e2723" stroke-width="0.8"/>
    <line x1="-8" y1="0" x2="-12" y2="-1" stroke="#3e2723" stroke-width="0.8"/>
    <line x1="-2" y1="3" x2="-4" y2="6" stroke="#3e2723" stroke-width="0.8"/>
    <line x1="2" y1="3" x2="4" y2="6" stroke="#3e2723" stroke-width="0.8"/>
  </g>
  <g transform="translate(145, 185)">
    <ellipse cx="0" cy="0" rx="5" ry="3.5" fill="#5d4037"/>
    <ellipse cx="-4" cy="0" rx="3" ry="2" fill="#4e342e"/>
    <line x1="-6" y1="-1" x2="-9" y2="-4" stroke="#3e2723" stroke-width="0.8"/>
    <line x1="-2" y1="3" x2="-3" y2="5" stroke="#3e2723" stroke-width="0.8"/>
    <line x1="2" y1="3" x2="3" y2="5" stroke="#3e2723" stroke-width="0.8"/>
  </g>
  <!-- Dust/frass -->
  <g fill="#a1887f" opacity="0.5">
    <circle cx="175" cy="200" r="1"/><circle cx="180" cy="195" r="0.8"/>
    <circle cx="185" cy="202" r="1"/><circle cx="225" cy="185" r="0.8"/>
    <circle cx="220" cy="192" r="1"/><circle cx="155" cy="195" r="0.8"/>
    <circle cx="200" cy="180" r="1"/><circle cx="210" cy="178" r="0.8"/>
  </g>
  <!-- Labels -->
  <rect x="10" y="10" width="150" height="24" rx="12" fill="#fff" opacity="0.9"/>
  <text x="85" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#e65100">Stored Grain Pests</text>
  <!-- Indicators -->
  <line x1="340" y1="140" x2="250" y2="128" stroke="#d32f2f" stroke-width="1.5"/>
  <text x="342" y="135" font-family="Arial,sans-serif" font-size="9" fill="#d32f2f">Bore holes</text>
  <text x="342" y="146" font-family="Arial,sans-serif" font-size="9" fill="#d32f2f">in grain</text>
  <line x1="340" y1="170" x2="240" y2="170" stroke="#d32f2f" stroke-width="1.5"/>
  <text x="342" y="168" font-family="Arial,sans-serif" font-size="9" fill="#5d4037">Grain weevil</text>
  <!-- Warning -->
  <rect x="100" y="240" width="200" height="22" rx="8" fill="#fff" opacity="0.7"/>
  <text x="200" y="255" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e65100">Check for powder residue and musty smell</text>
</svg>